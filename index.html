<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2026 | Live Results Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-red-700 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold uppercase tracking-widest">Nepal Election 2026</h1>
        <p class="text-sm opacity-90 mt-1">Live Vote Count Tracker | NK Digital Services</p>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="flex items-center justify-center space-x-2 my-4">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <p class="text-gray-600 font-medium">Live Updating...</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-md border-l-8 border-green-500">
                <h2 class="text-xl font-bold">Nepali Congress</h2>
                <div class="mt-4 flex justify-between items-end">
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold">Total Votes</p>
                        <p id="nc-votes" class="text-4xl font-black text-gray-800 tracking-tighter">0</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-bold">Leading in 45</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-l-8 border-blue-500">
                <h2 class="text-xl font-bold">Rastriya Swatantra Party</h2>
                <div class="mt-4 flex justify-between items-end">
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold">Total Votes</p>
                        <p id="rsp-votes" class="text-4xl font-black text-gray-800 tracking-tighter">0</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full font-bold">Leading in 32</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-500">
            <p>Built by <strong>NK Digital Services</strong></p>
            <p class="text-xs italic mt-2">Data sourced from Election Commission of Nepal (ECN)</p>
        </footer>
    </main>

    <script>
        // REPLACE THIS URL with your SheetDB/Sheety API URL
        const API_URL = "https://sheetdb.io/api/v1/your_api_id";

        async function fetchVotes() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Logic to update numbers based on your Sheet columns
                // document.getElementById('nc-votes').innerText = data[0].votes;
            } catch (error) {
                console.log("Error fetching data", error);
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(fetchVotes, 60000);
        fetchVotes();
    </script>
</body>
</html>
